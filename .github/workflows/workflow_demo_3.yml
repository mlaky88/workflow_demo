# Github actions

name: zgled3

on:
  push:
    branches: [ test ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        python-version: [3.8, 3.9]
        ubuntu-version: [ubuntu-22.04, ubuntu-latest]
    runs-on: ${{ matrix.ubuntu-version }}
    steps:
      
      - uses: actions/checkout@v4

      - name: Izpis spremenljivke
        run: echo $GITHUB_WORKSPACE

      - name: Nastavi Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Namesti odvisnosti za zagon našega projekta
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Zaženi teste
      - name: Zaženi teste
        run: pytest

      
